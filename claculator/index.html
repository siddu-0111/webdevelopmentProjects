<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculator</h1>
    <div class="container">
        <div class="calculator">
            <input class="operand" id="operand1" placeholder="0">
            <select class="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select> 
            <input class="operand" id="operand2" placeholder="0">
            <button id="calculate">=</button>
            <p id="result">result:</p>
        </div>
    </div>
    <script src="calc.js"></script>
</body>

</html>
